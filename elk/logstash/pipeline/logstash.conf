input {
  beats {
    port => 5044
  }
}

filter {
  if [log][level] {
    mutate {
      lowercase => ["[log][level]"]
    }
  }

  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "proxypay-logs"
    ilm_enabled => true
    ilm_policy => "proxypay-logs-policy"
    ilm_rollover_alias => "proxypay-logs"
    manage_template => true
    template => "/usr/share/logstash/templates/proxypay-logs-template.json"
    template_name => "proxypay-logs"
    template_overwrite => true
  }
}
