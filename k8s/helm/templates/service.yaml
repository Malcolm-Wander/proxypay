{{- if .Values.app.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "proxypay.fullname" . }}
  labels:
    {{ include "proxypay.labels" . | indent 4 }}
  annotations:
    {{- toYaml .Values.serviceAnnotations | nindent 4 }}
spec:
  type: {{ .Values.app.service.type }}
  selector:
    app: {{ include "proxypay.name" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.app.service.port }}
      targetPort: {{ .Values.app.service.targetPort }}
{{- end }}
