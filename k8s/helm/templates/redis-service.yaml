{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "proxypay.fullname" . }}-redis
  labels:
    {{ include "proxypay.labels" . | indent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  selector:
    app: {{ include "proxypay.name" . }}-redis
  ports:
    - protocol: TCP
      port: {{ .Values.redis.service.port }}
      targetPort: {{ .Values.redis.service.port }}
{{- end }}
